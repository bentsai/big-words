<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>big-words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --font: 'IBM Plex Sans', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }
  :root.ink {
    --bg: #111111;
    --fg: #f0f0f0;
  }
  :root.blue {
    --bg: #0aa0f5;
    --fg: #ffffff;
  }
  :root.purple {
    --bg: #7f0af5;
    --fg: #ffffff;
  }
  :root.pink {
    --bg: #f50ad6;
    --fg: #ffffff;
  }
  :root.red {
    --bg: #f73b6a;
    --fg: #ffffff;
  }
  :root.orange {
    --bg: #f5a40a;
    --fg: #ffffff;
  }
  :root.font-mono {
    --font: 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace;
  }
  :root.font-serif {
    --font: 'DM Serif Display', Georgia, 'Times New Roman', serif;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
  }

  #slide {
    position: absolute;
    top: 3%;
    left: 4%;
    width: 92%;
    height: 94%;
    display: flex;
    align-items: center;
  }

  #text {
    width: 100%;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    line-height: 1.05;
    letter-spacing: -0.02em;
    font-weight: 600;
  }

  .annotation {
    font-style: italic;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div id="slide">
  <div id="text"></div>
</div>
<script>
const SCALE = [1334,1112,926,772,643,536,446,372,310,258,215,179,149,124,104,86,72,60,50,42];
const textEl = document.getElementById('text');
const slideEl = document.getElementById('slide');

const FONTS = ['sans', 'mono', 'serif'];
const THEMES = ['paper', 'ink', 'presenter'];
const PRESENTER_COLORS = ['blue', 'purple', 'pink', 'red', 'orange', 'ink', 'paper'];
let slides = [];
let currentIndex = 0;
let currentFont = 'sans';
let currentTheme = 'paper';

function applyFont(font) {
  currentFont = font;
  const root = document.documentElement;
  root.classList.remove('font-mono', 'font-serif');
  if (font === 'mono') root.classList.add('font-mono');
  if (font === 'serif') root.classList.add('font-serif');
}

function applyTheme(theme) {
  currentTheme = theme;
  updateThemeDisplay();
}

function updateThemeDisplay() {
  const root = document.documentElement;
  ['ink', 'blue', 'purple', 'pink', 'red', 'orange'].forEach(t => root.classList.remove(t));
  if (currentTheme === 'presenter') {
    const color = PRESENTER_COLORS[currentIndex % PRESENTER_COLORS.length];
    if (color !== 'paper') root.classList.add(color);
  } else if (currentTheme === 'ink') {
    root.classList.add('ink');
  }
}

function fitText() {
  const maxH = slideEl.clientHeight;
  const maxW = slideEl.clientWidth;
  const annotations = textEl.querySelectorAll('.annotation');
  const text = slides[currentIndex] || '';
  const singleWord = !/[\s\n]/.test(text.trim());
  for (let i = 0; i < SCALE.length; i++) {
    textEl.style.fontSize = SCALE[i] + 'px';
    const annSize = Math.min(i + 4, SCALE.length - 1);
    annotations.forEach(a => a.style.fontSize = SCALE[annSize] + 'px');
    if (textEl.scrollHeight > maxH) continue;
    if (singleWord) {
      textEl.style.whiteSpace = 'nowrap';
      const natural = textEl.scrollWidth;
      textEl.style.whiteSpace = '';
      if (natural > maxW) continue;
    }
    return;
  }
}

function renderSlide() {
  if (slides.length === 0) {
    textEl.textContent = '';
    return;
  }
  if (currentIndex >= slides.length) currentIndex = slides.length - 1;
  if (currentIndex < 0) currentIndex = 0;
  const escaped = slides[currentIndex].replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  textEl.innerHTML = escaped.replace(/(\([^)]+\))(?=\n|$)/gm, '<span class="annotation">$1</span>').replace(/\n/g, '<br>');
  updateThemeDisplay();
  fitText();
}

document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowRight':
    case ' ':
    case 'Enter':
      if (currentIndex < slides.length - 1) { currentIndex++; renderSlide(); }
      e.preventDefault();
      break;
    case 'ArrowLeft':
    case 'Backspace':
      if (currentIndex > 0) { currentIndex--; renderSlide(); }
      e.preventDefault();
      break;
    case 'Home':
      currentIndex = 0; renderSlide();
      e.preventDefault();
      break;
    case 'End':
      currentIndex = slides.length - 1; renderSlide();
      e.preventDefault();
      break;
    case 'f':
      applyFont(FONTS[(FONTS.indexOf(currentFont) + 1) % FONTS.length]);
      renderSlide();
      e.preventDefault();
      break;
    case 't':
      applyTheme(THEMES[(THEMES.indexOf(currentTheme) + 1) % THEMES.length]);
      e.preventDefault();
      break;
    case 'b':
      textEl.style.visibility = textEl.style.visibility === 'hidden' ? '' : 'hidden';
      e.preventDefault();
      break;
  }
});

let resizeRaf;
window.addEventListener('resize', () => {
  cancelAnimationFrame(resizeRaf);
  resizeRaf = requestAnimationFrame(renderSlide);
});

const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
function connect() {
  const ws = new WebSocket(proto + '//' + location.host);
  ws.addEventListener('message', (event) => {
    const data = JSON.parse(event.data);
    slides = data.slides;

    if (data.title) document.title = data.title;
    applyTheme(data.theme || 'paper');
    applyFont(data.font || 'sans');

    renderSlide();
  });
  ws.addEventListener('close', () => setTimeout(connect, 1000));
}
connect();
</script>
</body>
</html>
